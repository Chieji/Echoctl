# Echoctl Workflow Parallelize Multi File Operations

## Action

Follow the parallelize-multi-file-operations workflow:
1. Refactor functions in src/tools/multi-file.ts to use Promise.all or similar parallelization.
2. Ensure deterministic result order in outputs.
3. Replace shell-based file operations with native Node.js fs/promises equivalents.
4. Add or update tests in tests/multi-file-optimized.test.ts to verify new behavior and order.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/tools/multi-file.ts, tests/multi-file-optimized.test.ts

